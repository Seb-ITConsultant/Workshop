 <!-- ── SEB'S WORKSHOP AUTH ── -->
<script>
(function(){
  var HASH='cde4e019dba2d940472dafe0015cdc74e3b837f02b4d3fd7a30952d80a6e4a70';
  var SALT='Sebs-Workshop-Salt-v1';
  var TOKEN='sw-auth-v1';
  var EXPIRY=7*24*60*60*1000;
  var STYLES='position:fixed;inset:0;z-index:999999;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;';

  document.documentElement.style.visibility='hidden';

  try{
    var stored=JSON.parse(localStorage.getItem(TOKEN)||'null');
    if(stored&&stored.hash===HASH&&stored.exp>Date.now()){
      document.documentElement.style.visibility='';
      return;
    }
  }catch(e){}

  function showOverlay(){
    var isDark=false;
    try{isDark=localStorage.getItem('sw-theme')==='dark';}catch(e){}
    var bg=isDark?'#0f1923':'#f0f4f8';
    var surface=isDark?'#1a2533':'#ffffff';
    var border=isDark?'#2a3a4d':'#dde3ea';
    var text=isDark?'#e8f0f8':'#0d1b2a';
    var muted=isDark?'#7a93aa':'#6b7a8d';
    var acc='#0d9488';

    var overlay=document.createElement('div');
    overlay.id='sw-auth-overlay';
    overlay.style.cssText=STYLES+'background:'+bg+';';
    overlay.innerHTML=
      '<div style="background:'+surface+';border:1px solid '+border+';border-radius:16px;padding:36px;width:440px;max-width:92vw;box-shadow:0 8px 40px rgba(0,0,0,.15);text-align:center;">'+
      '<div style="width:52px;height:52px;background:'+acc+';border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:24px;">🔒</div>'+
      '<h2 style="font-size:1.2rem;font-weight:700;color:'+text+';margin-bottom:4px;">Seb\'s Workshop</h2>'+
      '<p style="font-size:.78rem;color:'+muted+';margin-bottom:14px;line-height:1.6;">A personal collection of standalone IT tools built for MSP engineers. Diagnostics, compliance, reporting, capture analysis and more - all running entirely in your browser.</p>'+
      '<p style="font-size:.72rem;color:'+muted+';margin-bottom:18px;line-height:1.6;background:'+bg+';border:1px solid '+border+';border-radius:8px;padding:10px 12px;text-align:left;">🛠️ <strong style="color:'+text+';">Hobby project.</strong> Built in spare time - every effort is made to keep things accurate and functional, but I can\'t guarantee everything works perfectly in every scenario, especially Beta-labelled tools. Always verify results before making changes to a live system.</p>'+
      '<div style="background:'+bg+';border:1px solid '+border+';border-left:3px solid '+acc+';border-radius:8px;padding:12px 14px;margin-bottom:20px;text-align:left;">'+
      '<div style="font-size:.72rem;font-weight:700;color:'+acc+';margin-bottom:8px;">🔒 Your data never leaves your browser</div>'+
      '<div style="font-size:.72rem;color:'+muted+';line-height:1.6;margin-bottom:10px;">Every tool processes everything locally on your machine. No server, no database, no AI calls, no analytics. Safe to use with real client data, PCAPs and config exports.</div>'+
      '<div style="display:flex;flex-wrap:wrap;gap:5px;">'+
      '<span style="font-size:.65rem;font-weight:600;background:'+acc+'18;color:'+acc+';border-radius:20px;padding:2px 8px;">No uploads</span>'+
      '<span style="font-size:.65rem;font-weight:600;background:'+acc+'18;color:'+acc+';border-radius:20px;padding:2px 8px;">No AI processing</span>'+
      '<span style="font-size:.65rem;font-weight:600;background:'+acc+'18;color:'+acc+';border-radius:20px;padding:2px 8px;">No accounts</span>'+
      '<span style="font-size:.65rem;font-weight:600;background:'+acc+'18;color:'+acc+';border-radius:20px;padding:2px 8px;">No tracking</span>'+
      '<span style="font-size:.65rem;font-weight:600;background:'+acc+'18;color:'+acc+';border-radius:20px;padding:2px 8px;">Works offline</span>'+
      '</div></div>'+
      '<input id="sw-auth-input" type="password" placeholder="Password" autocomplete="current-password" '+
        'style="width:100%;padding:11px 14px;border:1px solid '+border+';border-radius:9px;font-size:.9rem;background:'+bg+';color:'+text+';outline:none;margin-bottom:10px;font-family:inherit;letter-spacing:.05em;" />'+
      '<div id="sw-auth-error" style="font-size:.75rem;color:#dc2626;margin-bottom:10px;min-height:18px;"></div>'+
      '<button id="sw-auth-btn" onclick="swAuthSubmit()" '+
        'style="width:100%;padding:11px;background:'+acc+';color:white;border:none;border-radius:9px;font-size:.9rem;font-weight:600;cursor:pointer;font-family:inherit;">'+
        'Unlock</button>'+
      '</div>';
    document.body.appendChild(overlay);
    document.documentElement.style.visibility='';

    document.getElementById('sw-auth-input').addEventListener('keydown',function(e){
      if(e.key==='Enter') swAuthSubmit();
    });
    setTimeout(function(){
      var inp=document.getElementById('sw-auth-input');
      if(inp) inp.focus();
    },100);
  }

  window.swAuthSubmit=function(){
    var inp=document.getElementById('sw-auth-input');
    var err=document.getElementById('sw-auth-error');
    var btn=document.getElementById('sw-auth-btn');
    var pw=inp?inp.value:'';
    if(!pw){if(err)err.textContent='Please enter the password.';return;}
    if(btn){btn.textContent='Checking...';btn.disabled=true;}
    if(err) err.textContent='';

    var enc=new TextEncoder();
    window.crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveBits'])
    .then(function(key){
      return window.crypto.subtle.deriveBits({
        name:'PBKDF2',salt:enc.encode(SALT),iterations:100000,hash:'SHA-256'
      },key,256);
    })
    .then(function(bits){
      var hex=Array.from(new Uint8Array(bits)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
      if(hex===HASH){
        try{localStorage.setItem(TOKEN,JSON.stringify({hash:HASH,exp:Date.now()+EXPIRY}));}catch(e){}
        var ov=document.getElementById('sw-auth-overlay');
        if(ov) ov.remove();
      } else {
        if(err) err.textContent='Incorrect password. Please try again.';
        if(inp){inp.value='';inp.focus();}
        if(btn){btn.textContent='Unlock';btn.disabled=false;}
      }
    })
    .catch(function(){
      if(err) err.textContent='Error checking password. Try again.';
      if(btn){btn.textContent='Unlock';btn.disabled=false;}
    });
  };

  if(document.body){showOverlay();}
  else{document.addEventListener('DOMContentLoaded',showOverlay);}
})();
</script>

const BASE_IDS    = Object.keys(LICENCES).filter(id => LICENCES[id].base);
const ADDON_IDS   = Object.keys(LICENCES).filter(id => LICENCES[id].addon);
const fmt = p => "£" + p.toFixed(2);

// ─── RECOMMENDATION ENGINE ───────────────────────────────────────────────────
function buildRecommendations(selFeatureIds) {
  if (!selFeatureIds.length) return [];
  const results = [];
  BASE_IDS.forEach(baseId => {
    const compatAddons = ADDON_IDS.filter(aId => {
      const ao = LICENCES[aId];
      return ao.compatibleWith && ao.compatibleWith.includes(baseId);
    });
    const usefulAddons = compatAddons.filter(aId =>
      selFeatureIds.some(fId => {
        const feat = FEATURES.find(f => f.id === fId);
        return feat && feat.includedIn.includes(aId) && !feat.includedIn.includes(baseId);
      })
    );
    const subsets = [[]];
    usefulAddons.forEach(aId => subsets.push([aId]));
    for (let i=0;i<usefulAddons.length;i++)
      for (let j=i+1;j<usefulAddons.length;j++)
        subsets.push([usefulAddons[i],usefulAddons[j]]);
    for (let i=0;i<usefulAddons.length;i++)
      for (let j=i+1;j<usefulAddons.length;j++)
        for (let k=j+1;k<usefulAddons.length;k++)
          subsets.push([usefulAddons[i],usefulAddons[j],usefulAddons[k]]);
    subsets.forEach(addonCombo => {
      const allIds = [baseId,...addonCombo];
      const covered = selFeatureIds.filter(fId => {
        const feat = FEATURES.find(f=>f.id===fId);
        return feat && allIds.some(lid=>feat.includedIn.includes(lid));
      });
      if (!covered.length) return;
      const totalPrice = allIds.reduce((s,id)=>s+LICENCES[id].price,0);
      const key = allIds.slice().sort().join('+');
      results.push({ key, baseId, addonIds:addonCombo, allIds, covered:covered.length, total:selFeatureIds.length, pct:covered.length/selFeatureIds.length, price:totalPrice });
    });
  });
  const seen = new Set();
  return results.filter(r=>{ if(seen.has(r.key)) return false; seen.add(r.key); return true; })
    .sort((a,b)=>b.pct-a.pct||a.price-b.price).slice(0,12);
}

// ─── COMPARE SLOT COLUMN HEADER ──────────────────────────────────────────────
function SlotHeader({ slot, onEdit, onRemove, isEditing }) {
  const base   = LICENCES[slot.baseId];
  const addons = slot.addonIds.map(id=>LICENCES[id]).filter(Boolean);
  const total  = [slot.baseId,...slot.addonIds].reduce((s,id)=>s+(LICENCES[id]?.price||0),0);
  return (
    <th style={{ textAlign:"center",padding:"10px 8px",background:"#f7f9fc",borderBottom:`3px solid ${base.color}`,minWidth:130,verticalAlign:"top" }}>
      <div style={{ fontSize:12,fontWeight:800,color:"#1a2332" }}>{base.short}</div>
      {addons.map(ao=><div key={ao.name} style={{ fontSize:10,color:ao.color,fontWeight:600,marginTop:1 }}>+{ao.short}</div>)}
      <div style={{ fontSize:14,fontWeight:800,color:base.color,marginTop:3 }}>{fmt(total)}<span style={{ fontSize:9,fontWeight:500,color:"#8896a5" }}>/mo</span></div>
      {base.badge&&<div style={{ fontSize:8,background:"#004B1C20",color:"#004B1C",borderRadius:4,padding:"1px 5px",fontWeight:700,marginTop:2,display:"inline-block" }}>{base.badge}</div>}
      <div style={{ display:"flex",gap:4,justifyContent:"center",marginTop:5 }}>
        <button onClick={onEdit} style={{ fontSize:10,padding:"2px 8px",borderRadius:5,border:`1px solid ${isEditing?"#0078D4":"#dde3ea"}`,background:isEditing?"#0078D410":"#fff",color:isEditing?"#0078D4":"#6b7a8d",cursor:"pointer",fontFamily:"inherit" }}>
          {isEditing?"▲ Close":"✏️ Edit"}
        </button>
        <button onClick={onRemove} style={{ fontSize:10,padding:"2px 8px",borderRadius:5,border:"1px solid #dde3ea",background:"#fff",color:"#dc3545",cursor:"pointer",fontFamily:"inherit" }}>✕</button>
      </div>
      <a href={base.docsUrl} target="_blank" rel="noopener noreferrer" style={{ fontSize:10,color:"#0078D4",textDecoration:"none",display:"block",marginTop:3 }}>Docs ↗</a>
    </th>
  );
}

                      <th style={{ textAlign:"left",padding:"12px 14px",background:"#f7f9fc",borderBottom:"2px solid #e8ecf0",fontSize:11,fontWeight:700,color:"#6b7a8d",textTransform:"uppercase",letterSpacing:"0.05em",minWidth:200,position:"sticky",left:0,zIndex:2,boxShadow:"2px 0 4px #0001" }}>Feature <span style={{fontWeight:400,textTransform:"none",fontSize:10,opacity:0.7}}>— click any row for details</span></th>
                      {compareSlots.map(slot=>(
                        <SlotHeader key={slot.id} slot={slot} isEditing={editingSlotId===slot.id}
                          onEdit={()=>toggleEdit(slot.id)} onRemove={()=>{ removeSlot(slot.id); if(editingSlotId===slot.id) setEditingSlotId(null); }}/>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {CATEGORIES.map(cat=>{
                      const allCatF=FEATURES.filter(f=>f.cat===cat);
                      const catF=diffOnly
                        ? allCatF.filter(f=>{ const vals=compareSlots.map(sl=>slotCovers(sl,f.id)); return !vals.every(v=>v===vals[0]); })
                        : allCatF;
                      if(!catF.length) return null;
                      return [
                        <tr key={"h-"+cat}>
                          <td colSpan={compareSlots.length+1} style={{ padding:"9px 14px 4px",background:"#f7f9fc",borderTop:"1px solid #e8ecf0" }}>
                            <Tag color={CAT_COLORS[cat]||"#6b7a8d"}>{cat}</Tag>
                          </td>
                        </tr>,
                        ...catF.map((f,fi)=>{
                          const isActive = cmpFocusFeat?.id===f.id;
                          const rowBg = isActive ? "#e8f0fe" : fi%2===0?"#fff":"#fafbff";
                          return (
                          <tr key={f.id} style={{ background:rowBg }}>
                            <td onClick={()=>setCmpFocusFeat(isActive?null:f)}
                              style={{ padding:"9px 14px",borderBottom:"1px solid #f0f4f8",position:"sticky",left:0,background:rowBg,zIndex:1,boxShadow:"2px 0 4px #0001",cursor:"pointer",borderLeft:`3px solid ${isActive?"#0078D4":"transparent"}`,transition:"all 0.12s" }}>
                              <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",gap:6 }}>
                                <div>
                                  <div style={{ fontSize:13,fontWeight:isActive?700:600,color:isActive?"#0078D4":"#1a2332" }}>{f.name}</div>
                                  <div style={{ fontSize:11,color:"#8896a5",lineHeight:1.4,maxWidth:260 }}>{f.desc.slice(0,90)}{f.desc.length>90?"…":""}</div>
                                </div>
                                <span style={{ fontSize:11,color:"#0078D4",opacity:isActive?1:0,transition:"opacity 0.12s",flexShrink:0 }}>ℹ︎</span>
                              </div>
                            </td>
                            {compareSlots.map(slot=>{
                              const has=slotCovers(slot,f.id);
                              return (
                                <td key={slot.id} style={{ textAlign:"center",borderBottom:"1px solid #f0f4f8",padding:"9px 8px",background:rowBg }}>
                                  <a href={f.docsUrl} target="_blank" rel="noopener noreferrer"
                                    title={(has?"✓ Included":"Not included")+" — click for Docs"}
                                    style={{ textDecoration:"none",display:"inline-block" }}>
                                    {has?<span style={{ fontSize:17,color:"#107C10",fontWeight:700 }}>✓</span>:<span style={{ fontSize:15,color:"#dde3ea" }}>—</span>}
                                  </a>
                                </td>
                              );
                            })}
                          </tr>
                          );
                        })
                      ];
                    })}
                  </tbody>
                </table>
              </div>
              </>
            )}
          </div>
        )}

        {/* FOOTER */}
        <div style={{ marginTop:32,padding:"10px 16px",background:"#fffbf0",borderRadius:10,border:"1px solid #ffe8a0",fontSize:12,color:"#78350f" }}>
          💡 <strong>UK pricing note:</strong> All prices are per user/month on an annual commitment, excluding VAT (20% UK VAT applies).
          Storage: Basic/Standard = 50 GB mailbox · 1 TB OneDrive. Premium/E3/E5/E7 = 100 GB mailbox · unlimited OneDrive. F3 = 2 GB mailbox · 2 GB OneDrive. F1 = no mailbox · 2 GB OneDrive.
          Teams Phone price is approximate (£8–12/mo depending on bundle). E7 GBP price is estimated (~£79); official pricing to be confirmed by Microsoft. Defender Suite and Purview Suite renamed from E5 Security / E5 Compliance in October 2025.
          Always verify at <a href="https://www.microsoft.com/en-gb/microsoft-365" target="_blank" rel="noopener noreferrer" style={{ color:"#0078D4" }}>microsoft.com/en-gb</a>.
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<button id="sw-theme-btn" onclick="swToggle()" title="Toggle dark / light mode" style="position:fixed;top:12px;right:14px;z-index:10000;width:34px;height:34px;border-radius:50%;border:1px solid rgba(128,128,128,.22);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);box-shadow:0 1px 6px rgba(0,0,0,.13);transition:background .2s;"></button>
<script>
(function(){
  var b=document.getElementById("sw-theme-btn");
  var dk=document.documentElement.getAttribute("data-theme")==="dark";
  b.textContent=dk?"☀":"🌙";
  b.style.background=dk?"rgba(14,20,32,.9)":"rgba(255,255,255,.9)";
})();
function swToggle(){
  var d=document.documentElement,dk=d.getAttribute("data-theme")==="dark",t=dk?"light":"dark";
  d.setAttribute("data-theme",t);localStorage.setItem("sw-theme",t);
  var b=document.getElementById("sw-theme-btn");
  b.textContent=dk?"🌙":"☀";
  b.style.background=dk?"rgba(255,255,255,.9)":"rgba(14,20,32,.9)";
}
</script>
</body>
</html>
