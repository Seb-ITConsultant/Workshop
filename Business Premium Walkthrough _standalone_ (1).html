document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

l><\u002Fspan>\n          <span class=\"arrow\">→<\u002Fspan>\n        <\u002Fa>\n        <a class=\"toc-row\" href=\"#enroll\">\n          <span class=\"ix\">03<\u002Fspan>\n          <span class=\"lbl\">Device onboarding<small>New laptops self-configure<\u002Fsmall><\u002Fspan>\n          <span class=\"arrow\">→<\u002Fspan>\n        <\u002Fa>\n        <a class=\"toc-row\" href=\"#wins\">\n          <span class=\"ix\">04<\u002Fspan>\n          <span class=\"lbl\">Lost laptop &amp; leavers<small>Wipe with one click<\u002Fsmall><\u002Fspan>\n          <span class=\"arrow\">→<\u002Fspan>\n        <\u002Fa>\n        <a class=\"toc-row\" href=\"#compare\">\n          <span class=\"ix\">05<\u002Fspan>\n          <span class=\"lbl\">Standard vs Premium<small>Plain-English comparison<\u002Fsmall><\u002Fspan>\n          <span class=\"arrow\">→<\u002Fspan>\n        <\u002Fa>\n      <\u002Faside>\n    <\u002Fdiv>\n\n    <div class=\"hero-meta\">\n      <div class=\"item\"><div class=\"k\">Reading time<\u002Fdiv><div class=\"v\">~5 min<\u002Fdiv><\u002Fdiv>\n      <div class=\"item\"><div class=\"k\">Scenarios<\u002Fdiv><div class=\"v\">4 real<\u002Fdiv><\u002Fdiv>\n      <div class=\"item\"><div class=\"k\">Jargon<\u002Fdiv><div class=\"v\">Translated<\u002Fdiv><\u002Fdiv>\n      <div class=\"item\"><div class=\"k\">Currency<\u002Fdiv><div class=\"v\">GBP<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 01 CONDITIONAL ACCESS -->\n<section id=\"access\" data-screen-label=\"02 Conditional Access\">\n  <div class=\"wrap\">\n    <div class=\"chapter-tag\">\n      <span class=\"num\">01<\u002Fspan>\n      <span>Chapter one — A bouncer for every sign-in<\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"section-head reveal\">\n      <div>\n        <h2>The password isn't enough. Premium asks <em style=\"font-style:normal; background:linear-gradient(180deg,transparent 62%,var(--yellow) 62%,var(--yellow) 92%,transparent 92%); padding:0 4px;\">five more questions<\u002Fem> before letting anyone in.<\u002Fh2>\n      <\u002Fdiv>\n      <p>Every login is scored by rules <em style=\"background:none\">you<\u002Fem> set. Same username, same password — Premium checks where, on what, and how risky it looks before opening the door. Pick a scenario:<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"ca-stage reveal\" id=\"caStage\">\n      <svg class=\"ca-svg\" viewBox=\"0 0 800 460\" preserveAspectRatio=\"none\" aria-hidden=\"true\">\n        <path id=\"caPath\" d=\"M 110 230 Q 280 230 400 230\" fill=\"none\" stroke=\"#0E0E0F\" stroke-width=\"1.2\" stroke-dasharray=\"4 6\" opacity=\"0.3\"><\u002Fpath>\n        <path id=\"caPath2\" d=\"M 400 230 Q 560 230 690 230\" fill=\"none\" stroke=\"#0E0E0F\" stroke-width=\"1.2\" stroke-dasharray=\"4 6\" opacity=\"0.3\"><\u002Fpath>\n        <circle id=\"caTraveller\" r=\"7\" fill=\"#0E0E0F\" cx=\"110\" cy=\"230\"><\u002Fcircle>\n      <\u002Fsvg>\n\n      <div class=\"ca-actor employee\" id=\"caActor\">\n        <div class=\"ca-icon\">👤<\u002Fdiv>\n        <h4 id=\"caActorName\">Alex (your employee)<\u002Fh4>\n        <p id=\"caActorDesc\">Opening Outlook on her work laptop, from the office.<\u002Fp>\n        <div class=\"ca-attempt\">\n          ATTEMPTING SIGN-IN<br>\n          <span id=\"caFromWhere\">→ from London office<\u002Fspan><br>\n          <span id=\"caFromDevice\">→ on her managed Windows laptop<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"ca-gate-wrap\">\n        <div class=\"ca-gate\">\n          <div>Conditional<\u002Fdiv>\n          <div>Access<\u002Fdiv>\n          <small>evaluating…<\u002Fsmall>\n        <\u002Fdiv>\n        <div class=\"ca-checks\" id=\"caChecks\">\n          <div class=\"ca-check\" data-check=\"user\"><span class=\"mark\">·<\u002Fspan><span>User identity<\u002Fspan><\u002Fdiv>\n          <div class=\"ca-check\" data-check=\"location\"><span class=\"mark\">·<\u002Fspan><span>Sign-in location<\u002Fspan><\u002Fdiv>\n          <div class=\"ca-check\" data-check=\"device\"><span class=\"mark\">·<\u002Fspan><span>Device compliance<\u002Fspan><\u002Fdiv>\n          <div class=\"ca-check\" data-check=\"risk\"><span class=\"mark\">·<\u002Fspan><span>Risk score<\u002Fspan><\u002Fdiv>\n          <div class=\"ca-check\" data-check=\"mfa\"><span class=\"mark\">·<\u002Fspan><span>MFA challenge<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"ca-actor\" id=\"caTarget\">\n        <div class=\"ca-icon\">📂<\u002Fdiv>\n        <h4>Company data<\u002Fh4>\n        <p>Email · SharePoint · Teams · finance files<\u002Fp>\n        <div class=\"ca-attempt\" id=\"caTargetState\">\n          STATE: <span style=\"color:var(--muted)\">waiting…<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"ca-controls reveal\">\n      <button data-scn=\"good\" class=\"active\">Employee from the office<\u002Fbutton>\n      <button data-scn=\"risky\">Same employee · café Wi-Fi<\u002Fbutton>\n      <button data-scn=\"attack\">Stolen password · foreign IP<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"ca-result reveal\" id=\"caResult\">Allowed, no extra prompts — trusted user on a trusted device.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 02 BYOD -->\n<section id=\"byod\" data-screen-label=\"03 BYOD\">\n  <div class=\"wrap\">\n    <div class=\"chapter-tag\">\n      <span class=\"num\">02<\u002Fspan>\n      <span>Chapter two — Personal devices, without the worry<\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"section-head reveal\">\n      <div>\n        <h2>\"Can our freelancer use <em>their own MacBook<\u002Fem> for our project?\"<\u002Fh2>\n      <\u002Fdiv>\n      <p>Bring-your-own-device is the question every small business faces — contractors, weekend laptops, the founder's iPad. The same question gets two very different answers depending on the plan.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"byod-illo reveal\">\n      <div class=\"header\">\n        <span>A contractor's iPhone · under Premium MAM<\u002Fspan>\n        <span>WORK BOUNDARY ▒▒▒▒▒<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"phone-row\">\n        <div class=\"phone\"><div class=\"scr\">\n          <div class=\"stripe\"><\u002Fdiv><div class=\"stripe\"><\u002Fdiv><div class=\"stripe k\"><\u002Fdiv>\n          <div class=\"stripe k\"><\u002Fdiv><div class=\"stripe y\"><\u002Fdiv><div class=\"stripe\"><\u002Fdiv>\n          <div class=\"stripe\"><\u002Fdiv><div class=\"stripe k\"><\u002Fdiv><div class=\"stripe\"><\u002Fdiv>\n        <\u002Fdiv><\u002Fdiv>\n        <div class=\"bands\">\n          <div class=\"band work\"><span class=\"name\">Work apps<\u002Fspan><span class=\"what\">— Outlook · Teams · OneDrive<\u002Fspan><span class=\"what\">managed<\u002Fspan><\u002Fdiv>\n          <div class=\"band personal\"><span class=\"name\">Personal apps<\u002Fspan><span class=\"what\">— iMessage · Photos · Spotify · Banking<\u002Fspan><span class=\"what\">untouched<\u002Fspan><\u002Fdiv>\n          <div class=\"band work\"><span class=\"name\">Copy/paste between zones<\u002Fspan><span class=\"what\">— blocked one-way<\u002Fspan><span class=\"what\">policy<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-family:var(--font-mono);font-size:11px;color:var(--muted);text-align:right\">PERSONAL<br>BOUNDARY<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"byod reveal\">\n      <div class=\"bcard now\">\n        <span class=\"tag\">On Standard today<\u002Fspan>\n        <h3>Yes, but everything's exposed.<\u002Fh3>\n        <ul class=\"sc-list\">\n          <li><span class=\"ic\">!<\u002Fspan>Contractor signs in with their personal device — no checks on the device itself.<\u002Fli>\n          <li><span class=\"ic\">!<\u002Fspan>They can download files to their hard drive, sync your SharePoint, copy emails to a personal Gmail.<\u002Fli>\n          <li><span class=\"ic\">!<\u002Fspan>When the contract ends, you change their password and hope nothing was copied off.<\u002Fli>\n          <li><span class=\"ic\">!<\u002Fspan>If their laptop is stolen, your files are on it. You have no way to remove them.<\u002Fli>\n        <\u002Ful>\n        <div class=\"outcome\">You're trusting a person, not a system.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"bcard next\">\n        <span class=\"tag\">On Premium<\u002Fspan>\n        <h3>Yes, and the work stays in a box.<\u002Fh3>\n        <ul class=\"sc-list\">\n          <li><span class=\"ic\">✓<\u002Fspan>Work email &amp; Office apps run inside a managed container. The rest of the device is untouched.<\u002Fli>\n          <li><span class=\"ic\">✓<\u002Fspan>Files can't be saved to personal Downloads, copied to iCloud, or pasted into a personal browser.<\u002Fli>\n          <li><span class=\"ic\">✓<\u002Fspan>Screen-lock and copy-paste rules apply only to the work apps. Their photos and texts are invisible to you.<\u002Fli>\n          <li><span class=\"ic\">✓<\u002Fspan>When the contract ends, you wipe only the work container. Their machine and personal data are untouched.<\u002Fli>\n        <\u002Ful>\n        <div class=\"outcome\">You're trusting the boundary, not the person.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 03 DEVICE ONBOARDING -->\n<section id=\"enroll\" data-screen-label=\"04 Device onboarding\">\n  <div class=\"wrap\">\n    <div class=\"chapter-tag\">\n      <span class=\"num\">03<\u002Fspan>\n      <span>Chapter three — A new laptop, ready in 15 minutes<\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"section-head reveal\">\n      <div>\n        <h2>Order, ship, sign-in. The laptop sets <em>itself<\u002Fem> up.<\u002Fh2>\n      <\u002Fdiv>\n      <p>\"Zero-touch\" provisioning. Buy from any retailer, ship straight to the employee, they sign in once and the laptop joins the company directory, installs apps, encrypts the drive, applies policies — hands-off.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"demo reveal\">\n      <div class=\"demo-steps\" id=\"enrollSteps\">\n        <button class=\"step-btn\" data-step=\"1\" aria-current=\"true\">\n          <span class=\"step-num\">1<\u002Fspan>\n          <span><div class=\"step-h\">Laptop arrives in the box<\u002Fdiv><div class=\"step-d\">Bought from any retailer. Never opened by IT. Ships straight to the employee's home.<\u002Fdiv><\u002Fspan>\n        <\u002Fbutton>\n        <button class=\"step-btn\" data-step=\"2\">\n          <span class=\"step-num\">2<\u002Fspan>\n          <span><div class=\"step-h\">Employee signs in with their work email<\u002Fdiv><div class=\"step-d\">The laptop recognises your tenant and pulls down its assigned configuration.<\u002Fdiv><\u002Fspan>\n        <\u002Fbutton>\n        <button class=\"step-btn\" data-step=\"3\">\n          <span class=\"step-num\">3<\u002Fspan>\n          <span><div class=\"step-h\">Apps, settings &amp; policies install themselves<\u002Fdiv><div class=\"step-d\">Office, browser, VPN, printer drivers, screen-lock, disk encryption — all in the background.<\u002Fdiv><\u002Fspan>\n        <\u002Fbutton>\n        <button class=\"step-btn\" data-step=\"4\">\n          <span class=\"step-num\">4<\u002Fspan>\n          <span><div class=\"step-h\">Ready for work — visible in your console<\u002Fdiv><div class=\"step-d\">Enrolled, encrypted, compliant, and tied to a named owner.<\u002Fdiv><\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fdiv>\n\n      <div>\n        <div class=\"laptop\" aria-hidden=\"true\">\n          <div class=\"laptop-screen\">\n            <div class=\"ls-bar\">\n              <i><\u002Fi><i><\u002Fi><i><\u002Fi>\n              <span class=\"url\" id=\"urlBar\">setup://welcome<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"ls-body\">\n              <div class=\"ls-stage on\" data-stage=\"1\">\n                <div class=\"box-anim\">\n                  <div class=\"box-art\"><\u002Fdiv>\n                  <div>Sealed from the factory · IT never touched it<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"ls-stage\" data-stage=\"2\">\n                <div class=\"signin\">\n                  <h4>Welcome. Sign in to begin.<\u002Fh4>\n                  <div class=\"field typed\">alex.morgan@yourcompany.co.uk<\u002Fdiv>\n                  <div class=\"field\"><span>●●●●●●●<\u002Fspan><span class=\"cursor\"><\u002Fspan><\u002Fdiv>\n                  <div class=\"btn-row\">\n                    <button class=\"btn-mini\">Cancel<\u002Fbutton>\n                    <button class=\"btn-mini primary\">Sign in<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"ls-stage\" data-stage=\"3\">\n                <div class=\"progress\">\n                  <h4>Setting things up for Alex…<\u002Fh4>\n                  <div class=\"prog-item done\"><span class=\"prog-check\">✓<\u002Fspan>Joining the company directory<\u002Fdiv>\n                  <div class=\"prog-item done\"><span class=\"prog-check\">✓<\u002Fspan>Encrypting the hard drive (BitLocker)<\u002Fdiv>\n                  <div class=\"prog-item active\"><span class=\"prog-check\"><\u002Fspan>Installing Office, Teams, browser<\u002Fdiv>\n                  <div class=\"prog-item\"><span class=\"prog-check\"><\u002Fspan>Applying screen-lock &amp; update policy<\u002Fdiv>\n                  <div class=\"prog-item\"><span class=\"prog-check\"><\u002Fspan>Connecting to printers<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"ls-stage\" data-stage=\"4\">\n                <div class=\"done-stage\">\n                  <div class=\"tile sage\">\n                    <span class=\"k\">STATUS<\u002Fspan>\n                    <b>Compliant<\u002Fb>\n                    <span>Disk encrypted · Updates current · Screen-lock on<\u002Fspan>\n                  <\u002Fdiv>\n                  <div class=\"tile\">\n                    <span class=\"k\">OWNER<\u002Fspan>\n                    <b>Alex Morgan<\u002Fb>\n                    <span>alex.morgan@yourcompany.co.uk<\u002Fspan>\n                  <\u002Fdiv>\n                  <div class=\"tile\">\n                    <span class=\"k\">APPS DEPLOYED<\u002Fspan>\n                    <b>14 of 14<\u002Fb>\n                    <span>Office · Teams · Chrome · Adobe · …<\u002Fspan>\n                  <\u002Fdiv>\n                  <div class=\"tile warn\">\n                    <span class=\"k\">TIME ELAPSED<\u002Fspan>\n                    <b>14 min 23 sec<\u002Fb>\n                    <span>Hands-off after sign-in<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"tech-stack\">\n          Behind the scenes: <b>Entra ID<\u002Fb> (the company directory) · <b>Intune<\u002Fb> (device manager) · <b>Autopilot<\u002Fb> (zero-touch setup)\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 04 QUICK WINS -->\n<section id=\"wins\" data-screen-label=\"05 Quick wins\">\n  <div class=\"wrap\">\n    <div class=\"chapter-tag\">\n      <span class=\"num\">04<\u002Fspan>\n      <span>Chapter four — Two more situations you've worried about<\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"section-head reveal\">\n      <div>\n        <h2>\"What if…\" <em>solved.<\u002Fem><\u002Fh2>\n      <\u002Fdiv>\n      <p>The reason most owners actually look at Premium isn't the feature list. It's the night they couldn't sleep over a lost laptop or a departing employee.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"mini-grid reveal\">\n      <div class=\"mini\">\n        <span class=\"ke\">Scenario · Lost in an airport<\u002Fspan>\n        <div class=\"mini-visual\"><div class=\"laptop-shrink\"><div class=\"scr\">💼<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <h3>The laptop is gone. The data isn't.<\u002Fh3>\n        <p>An employee leaves their bag at security. From your phone, you press one button. The next time that laptop wakes up, it wipes itself before the login screen finishes loading.<\u002Fp>\n        <div class=\"tail\">Remote wipe · Intune →<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"mini\">\n        <span class=\"ke\">Scenario · Someone resigns<\u002Fspan>\n        <div class=\"mini-visual\">\n          <div class=\"split\">\n            <div class=\"split-block\"><div class=\"line k\"><\u002Fdiv><div class=\"line k\"><\u002Fdiv><div class=\"line k\"><\u002Fdiv><div class=\"line\"><\u002Fdiv><\u002Fdiv>\n            <span class=\"split-arrow\">→<\u002Fspan>\n            <div class=\"split-block gone\"><div class=\"line\"><\u002Fdiv><div class=\"line\"><\u002Fdiv><div class=\"line\"><\u002Fdiv><div class=\"line\"><\u002Fdiv><\u002Fdiv>\n            <span class=\"split-arrow\">→<\u002Fspan>\n            <div class=\"split-block\"><div class=\"line\"><\u002Fdiv><div class=\"line\"><\u002Fdiv><div class=\"line\"><\u002Fdiv><div class=\"line\"><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <h3>Pull the work files. Leave the holiday photos.<\u002Fh3>\n        <p>On BYOD, remove only the corporate container — emails, OneDrive files, Teams — without touching anything personal. The leaver keeps their phone. You keep your data.<\u002Fp>\n        <div class=\"tail\">Selective wipe · Intune MAM →<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"mini\">\n        <span class=\"ke\">Quick win · Password reset<\u002Fspan>\n        <div class=\"mini-visual\" style=\"background:var(--blue-bg)\">\n          <div style=\"font-family:var(--font-mono);font-size:13px;color:var(--blue-deep);text-align:center;line-height:1.6\">\n            user → forgot password<br>\n            phone&nbsp;→&nbsp;verify code<br>\n            <span style=\"color:var(--green)\">✓ back in<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <h3>Stop being the help desk.<\u002Fh3>\n        <p>Self-service password reset — staff prove who they are on their phone and recover their own account. You don't get a Slack ping at 7am.<\u002Fp>\n        <div class=\"tail\">Self-service password reset →<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"mini\">\n        <span class=\"ke\">Quick win · Threat protection<\u002Fspan>\n        <div class=\"mini-visual\" style=\"background:var(--red-bg)\">\n          <div style=\"font-family:var(--font-mono);font-size:13px;color:var(--red);text-align:center;line-height:1.6\">\n            inbound email<br>\n            ↓<br>\n            <span style=\"color:var(--green)\">link rewritten · scanned · blocked<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <h3>Phishing &amp; malware, intercepted.<\u002Fh3>\n        <p>Defender for Business protects every PC; Defender for Office 365 P1 sandboxes dodgy attachments and rewrites links so a click is checked at the moment it happens, not when the email arrived.<\u002Fp>\n        <div class=\"tail\">Defender for Business + O365 P1 →<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 05 COMPARISON -->\n<section id=\"compare\" data-screen-label=\"06 Compare\">\n  <div class=\"wrap\">\n    <div class=\"chapter-tag\">\n      <span class=\"num\">05<\u002Fspan>\n      <span>Chapter five — Standard vs Premium, in plain English<\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"section-head reveal\">\n      <div>\n        <h2>What's in each plan. Filter by what matters to <em>you.<\u002Fem><\u002Fh2>\n      <\u002Fdiv>\n      <p>Both plans give you the same Word, Excel, Outlook, and Teams. Premium adds everything in the \"Security &amp; devices\" rows — that's the value gap.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"cmp-controls reveal\" id=\"cmpControls\">\n      <button class=\"pill\" aria-pressed=\"true\" data-filter=\"all\">Everything<\u002Fbutton>\n      <button class=\"pill\" aria-pressed=\"false\" data-filter=\"security\">Security &amp; devices<\u002Fbutton>\n      <button class=\"pill\" aria-pressed=\"false\" data-filter=\"apps\">Apps &amp; collaboration<\u002Fbutton>\n      <button class=\"pill\" aria-pressed=\"false\" data-filter=\"recovery\">Recovery &amp; control<\u002Fbutton>\n    <\u002Fdiv>\n\n    <div class=\"cmp reveal\" id=\"cmpTable\">\n      <div class=\"cmp-row head\">\n        <div>Feature<\u002Fdiv>\n        <div class=\"plan\"><b>Business Standard<\u002Fb><span>£10.30 / user / month<\u002Fspan><\u002Fdiv>\n        <div class=\"plan\"><b>Business Premium<\u002Fb><span>£18.10 / user / month<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"cmp-row\" data-cat=\"apps\"><div>Word, Excel, PowerPoint, Outlook<\u002Fdiv><div class=\"cmp-cell\"><span class=\"yes\">Included<\u002Fspan><\u002Fdiv><div class=\"cmp-cell\"><span class=\"yes\">Included<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"cmp-row\" data-cat=\"apps\"><div>Teams, SharePoint, OneDrive 1TB<\u002Fdiv><div class=\"cmp-cell\"><span class=\"yes\">Included<\u002Fspan><\u002Fdiv><div class=\"cmp-cell\"><span class=\"yes\">Included<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"cmp-row\" data-cat=\"apps\"><div>Custom domain email + Exchange 50GB<\u002Fdiv><div class=\"cmp-cell\"><span class=\"yes\">Included<\u002Fspan><\u002Fdiv><div class=\"cmp-cell\"><span class=\"yes\">Included<\u002Fspan><\u002Fdiv><\u002Fdiv>\n\n      <div class=\"cmp-row\" data-cat=\"security\"><div>Add &amp; manage PCs in your tenant (Entra join)<\u002Fdiv><div class=\"cmp-cell\"><span class=\"no\">Sign-in only<\u002Fspan><\u002Fdiv><div class=\"cmp-cell\"><span class=\"yes\">Full device join<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"cmp-row\" data-cat=\"security\"><div>Zero-touch laptop setup (Autopilot)<\u002Fdiv><div class=\"cmp-cell\"><span class=\"no\">Manual per laptop<\u002Fspan><\u002Fdiv><div class
